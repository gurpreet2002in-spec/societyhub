<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Elite Living</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                "surface": "#f8f9fa",
                "inverse-surface": "#2e3132",
                "surface-variant": "#e1e3e4",
                "secondary-fixed": "#6bff8f",
                "on-secondary-container": "#007432",
                "on-tertiary-fixed": "#351000",
                "surface-tint": "#4d44e3",
                "primary-container": "#4f46e5",
                "on-primary-fixed": "#0f0069",
                "tertiary-fixed": "#ffdbcc",
                "surface-container-lowest": "#ffffff",
                "on-error": "#ffffff",
                "surface-container-low": "#f3f4f5",
                "background": "#f8f9fa",
                "on-primary": "#ffffff",
                "primary": "#3525cd",
                "surface-bright": "#f8f9fa",
                "tertiary-fixed-dim": "#ffb695",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }
        h1, h2, h3 {
            font-family: 'Manrope', sans-serif;
        }
        .otp-input:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col">
<!-- Hero Decorative Section (Asymmetric Editorial Style) -->
<main class="flex-grow flex items-center justify-center px-6 py-12 md:py-24">
<div class="max-w-md w-full space-y-12">
<!-- Branding & Logo -->
<div class="flex flex-col items-center text-center space-y-6">
<div class="w-16 h-16 bg-primary-container rounded-lg flex items-center justify-center shadow-lg transform -rotate-6">
<span class="material-symbols-outlined text-white text-4xl" data-icon="apartment">apartment</span>
</div>
<div class="space-y-2">
<h1 class="text-4xl font-extrabold tracking-tight text-on-surface">Welcome to Elite Living</h1>
<p class="text-on-surface-variant font-body">Enter your mobile number to get started</p>
</div>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-lg p-8 md:p-10 shadow-[0_20px_50px_rgba(0,0,0,0.04)] border border-outline-variant/10">
<form action="#" class="space-y-8" method="POST">
<!-- Mobile Input Group -->
<div class="space-y-2">
<label class="block text-xs font-semibold uppercase tracking-widest text-on-surface-variant ml-1" for="phone">Mobile Number</label>
<div class="relative flex items-center group">
<span class="absolute left-4 text-on-surface-variant font-medium border-r border-outline-variant/30 pr-3">+91</span>
<input class="w-full pl-16 pr-4 py-4 bg-surface-container-highest border-none rounded-md focus:ring-2 focus:ring-primary/20 transition-all text-on-surface font-medium placeholder:text-outline/50" id="phone" name="phone" placeholder="98765 43210" type="tel"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary-container hover:bg-primary text-white font-bold py-4 rounded-full transition-all transform active:scale-95 shadow-md shadow-primary/20 uppercase tracking-wider text-sm" type="submit">
                        Get OTP
                    </button>
</form>
<!-- OTP Verification (Initially Hidden/State Reference) -->
<div class="mt-12 pt-10 border-t border-surface-container-low">
<div class="space-y-8">
<div class="space-y-2">
<h2 class="text-lg font-bold text-on-surface">Verify Identity</h2>
<p class="text-sm text-on-surface-variant">We've sent a 6-digit code to your number.</p>
</div>
<!-- OTP Inputs -->
<div class="flex justify-between gap-2">
<input class="otp-input w-12 h-14 text-center text-xl font-bold bg-surface-container-low border-none rounded-md focus:ring-2 focus:ring-primary/20" maxlength="1" type="text"/>
<input class="otp-input w-12 h-14 text-center text-xl font-bold bg-surface-container-low border-none rounded-md focus:ring-2 focus:ring-primary/20" maxlength="1" type="text"/>
<input class="otp-input w-12 h-14 text-center text-xl font-bold bg-surface-container-low border-none rounded-md focus:ring-2 focus:ring-primary/20" maxlength="1" type="text"/>
<input class="otp-input w-12 h-14 text-center text-xl font-bold bg-surface-container-low border-none rounded-md focus:ring-2 focus:ring-primary/20" maxlength="1" type="text"/>
<input class="otp-input w-12 h-14 text-center text-xl font-bold bg-surface-container-low border-none rounded-md focus:ring-2 focus:ring-primary/20" maxlength="1" type="text"/>
<input class="otp-input w-12 h-14 text-center text-xl font-bold bg-surface-container-low border-none rounded-md focus:ring-2 focus:ring-primary/20" maxlength="1" type="text"/>
</div>
<div class="flex items-center justify-between">
<p class="text-xs text-on-surface-variant">Didn't receive code?</p>
<button class="text-xs font-bold text-primary hover:underline transition-all">Resend OTP</button>
</div>
</div>
</div>
</div>
<!-- Footer Meta -->
<div class="text-center space-y-4">
<p class="text-sm text-on-surface-variant">
                    By continuing, you agree to our 
                    <a class="text-on-surface font-semibold hover:text-primary transition-colors" href="#">Terms of Service</a>
</p>
<div class="flex items-center justify-center space-x-2 text-outline/40">
<span class="material-symbols-outlined text-sm" data-icon="verified_user">verified_user</span>
<span class="text-[10px] uppercase tracking-tighter font-bold">Secure Bank-Grade Encryption</span>
</div>
</div>
</div>
</main>
<!-- Support Floating UI -->
<div class="fixed bottom-8 right-8 hidden md:block">
<button class="bg-surface-container-lowest p-4 rounded-full shadow-lg border border-outline-variant/10 flex items-center space-x-3 hover:bg-surface-container-low transition-colors group">
<span class="material-symbols-outlined text-primary" data-icon="help_outline">help_outline</span>
<span class="text-xs font-bold text-on-surface opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">Need Help?</span>
</button>
</div>
<!-- Background Decorative Element (Asymmetric Soft Gradients) -->
<div class="fixed top-0 right-0 -z-10 w-1/3 h-1/2 bg-gradient-to-bl from-primary-fixed/30 to-transparent blur-3xl opacity-50"></div>
<div class="fixed bottom-0 left-0 -z-10 w-1/4 h-1/3 bg-gradient-to-tr from-secondary-fixed/20 to-transparent blur-3xl opacity-40"></div>
</body></html>
