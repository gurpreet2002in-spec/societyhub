<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Security Scanner | Elevated Living</title>
<script src="https://cdn.tailwindcss.org?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-surface-variant": "#464555",
              "outline-variant": "#c7c4d8",
              "on-surface": "#191c1d",
              "on-error": "#ffffff",
              "surface-container-lowest": "#ffffff",
              "on-background": "#191c1d",
              "surface-variant": "#e1e3e4",
              "on-secondary-fixed": "#002109",
              "error": "#ba1a1a",
              "surface-container": "#edeeef",
              "secondary-fixed": "#6bff8f",
              "primary": "#3525cd",
              "on-secondary-container": "#007432",
              "tertiary-fixed": "#ffdbcc",
              "on-primary-container": "#dad7ff",
              "inverse-on-surface": "#f0f1f2",
              "tertiary": "#7e3000",
              "secondary-fixed-dim": "#4ae176",
              "on-primary-fixed": "#0f0069",
              "on-primary-fixed-variant": "#3323cc",
              "on-primary": "#ffffff",
              "surface-dim": "#d9dadb",
              "surface-bright": "#f8f9fa",
              "surface-container-high": "#e7e8e9",
              "tertiary-fixed-dim": "#ffb695",
              "tertiary-container": "#a44100",
              "secondary-container": "#6bff8f",
              "on-secondary": "#ffffff",
              "inverse-surface": "#2e3132",
              "outline": "#777587",
              "on-tertiary-container": "#ffd2be",
              "on-tertiary": "#ffffff",
              "error-container": "#ffdad6",
              "inverse-primary": "#c3c0ff",
              "secondary": "#006e2f",
              "background": "#f8f9fa",
              "surface-container-highest": "#e1e3e4",
              "surface-tint": "#4d44e3",
              "on-tertiary-fixed": "#351000",
              "on-tertiary-fixed-variant": "#7b2f00",
              "primary-container": "#4f46e5",
              "primary-fixed-dim": "#c3c0ff",
              "surface-container-low": "#f3f4f5",
              "surface": "#f8f9fa",
              "primary-fixed": "#e2dfff",
              "on-secondary-fixed-variant": "#005321",
              "on-error-container": "#93000a"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .scanner-viewfinder {
            box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-surface antialiased overflow-hidden">
<!-- Top Navigation Bar (Contextual Suppression of Main Nav) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-8">
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-black/30 backdrop-blur-xl text-white active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<div class="flex flex-col items-center">
<span class="font-headline font-extrabold text-white tracking-tight">Scanner</span>
<span class="text-[10px] font-bold text-white/70 uppercase tracking-[0.2em]">Gate 02 • Entry</span>
</div>
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-black/30 backdrop-blur-xl text-white active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="flashlight_on">flashlight_on</span>
</button>
</header>
<!-- Main Camera Canvas -->
<main class="relative h-screen w-full bg-slate-900 flex flex-col items-center justify-center">
<!-- Background Simulated Camera Feed -->
<div class="absolute inset-0 z-0">
<img alt="Blurred view of a residential building gate area" class="w-full h-full object-cover opacity-60 grayscale-[20%]" data-alt="Blurred view of a residential building gate area" src="https://lh3.googleusercontent.com/aida-public/AB6AXuChNKFM1GX1Sl63VK6vFwi6YklNVq3xyBn7IILz_meWRX-quqFHbOKKZE1hgjtnosUXi4mD9oz8-toJdSwbcDphVu_sA74rvdRv5wKfbnlDwXXIlm-vgIkgrbJBI-YxkYL06INZ7r8F9q2FG1cUYW4HdIuG12Xv9gm8gN4hq2SDZkUTFIpHuwSEDX_lWu7IQN85pbMb_iE5BQRI3aDQCsbTPkFVQDquaLJxC_49P2HcOIXgEsj4L5LJCYQybIHDAauF5PflRr0pFCM"/>
</div>
<!-- Scanning Overlay -->
<div class="relative z-10 w-full max-w-sm px-10 flex flex-col items-center">
<div class="relative w-full aspect-square scanner-viewfinder rounded-[3rem] border-[3px] border-white/40 overflow-hidden">
<!-- Scanning Laser Line -->
<div class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-white to-transparent shadow-[0_0_15px_rgba(255,255,255,0.8)] translate-y-[150px]"></div>
<!-- Corner Accents -->
<div class="absolute top-8 left-8 w-10 h-10 border-t-4 border-l-4 border-white rounded-tl-xl"></div>
<div class="absolute top-8 right-8 w-10 h-10 border-t-4 border-r-4 border-white rounded-tr-xl"></div>
<div class="absolute bottom-8 left-8 w-10 h-10 border-b-4 border-l-4 border-white rounded-bl-xl"></div>
<div class="absolute bottom-8 right-8 w-10 h-10 border-b-4 border-r-4 border-white rounded-br-xl"></div>
</div>
<p class="mt-8 text-white font-medium text-sm text-center px-4 py-2 rounded-full bg-black/20 backdrop-blur-md">
                Align QR code within the frame
            </p>
</div>
</main>
<!-- Scanning Result Bottom Sheet (Active State: Valid Vehicle) -->
<div class="fixed bottom-0 left-0 w-full z-50 p-4 transition-transform translate-y-0">
<div class="bg-surface-container-lowest rounded-xl shadow-[0_-8px_40px_rgba(0,0,0,0.12)] overflow-hidden">
<!-- Header Status Bar -->
<div class="bg-secondary-container px-6 py-3 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-white flex items-center justify-center text-on-secondary-container">
<span class="material-symbols-outlined text-[20px]" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<span class="font-headline font-bold text-on-secondary-container tracking-tight">VALID ENTRY</span>
</div>
<span class="text-[10px] font-bold text-on-secondary-container/60 uppercase tracking-widest">Resident</span>
</div>
<!-- Result Content -->
<div class="p-6">
<div class="flex items-start justify-between mb-8">
<div class="space-y-1">
<p class="text-[10px] font-bold text-outline uppercase tracking-widest">Vehicle Details</p>
<h2 class="text-3xl font-headline font-black text-on-surface tracking-tighter uppercase">MH-12-AB-1234</h2>
<div class="flex items-center gap-2 mt-1">
<span class="text-sm font-semibold text-on-surface-variant bg-surface-container-low px-2 py-0.5 rounded-md">Flat A-402</span>
<span class="text-sm font-semibold text-on-surface-variant bg-surface-container-low px-2 py-0.5 rounded-md">Alex Johnson</span>
</div>
</div>
<div class="w-16 h-16 rounded-2xl bg-surface-container-low flex items-center justify-center">
<span class="material-symbols-outlined text-outline text-[32px]" data-icon="directions_car">directions_car</span>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-white font-headline font-bold py-5 rounded-full shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-3">
<span>CONFIRM &amp; OPEN GATE</span>
<span class="material-symbols-outlined" data-icon="door_front">door_front</span>
</button>
</div>
</div>
</div>
<!-- Secondary Status Indicators (Mini Toast Notifications) -->
<div class="fixed bottom-[340px] left-0 w-full flex flex-col items-center gap-3 pointer-events-none opacity-50 px-6">
<!-- Unauthorized Toast Example -->
<div class="w-full max-w-sm bg-error-container/90 backdrop-blur-md rounded-2xl p-4 flex items-center gap-4 border border-error/10">
<div class="w-10 h-10 rounded-full bg-error flex items-center justify-center text-on-error">
<span class="material-symbols-outlined" data-icon="warning" style="font-variation-settings: 'FILL' 1;">warning</span>
</div>
<div>
<p class="text-xs font-bold text-on-error-container uppercase tracking-wide">Unauthorized</p>
<p class="text-[10px] text-on-error-container/70 font-medium leading-none mt-0.5">Guest pass has expired 2h ago</p>
</div>
</div>
<!-- Wrong Slot Toast Example -->
<div class="w-full max-w-sm bg-tertiary-fixed/90 backdrop-blur-md rounded-2xl p-4 flex items-center gap-4 border border-tertiary-container/10">
<div class="w-10 h-10 rounded-full bg-tertiary-container flex items-center justify-center text-white">
<span class="material-symbols-outlined" data-icon="wrong_location" style="font-variation-settings: 'FILL' 1;">wrong_location</span>
</div>
<div>
<p class="text-xs font-bold text-on-tertiary-fixed uppercase tracking-wide">Wrong Slot</p>
<p class="text-[10px] text-on-tertiary-fixed/70 font-medium leading-none mt-0.5">Assigned: B-002 • Detected: A-402</p>
</div>
</div>
</div>
</body></html>
